spring:
  application:
    name: pd-server
  cloud:
    nacos:
      config:
        enabled: true
        # Nacos 配置中心地址
        server-addr: 8.130.49.28:8848
        # 命名空间ID
        namespace: pd_system
        # 配置文件分组
        group: DEFAULT_GROUP
        # 配置文件格式（主配置）
        file-extension: yaml
        # 启用配置刷新
        refresh-enabled: true
        # 共享配置
        shared-configs:
          # Data Id: common
          - data-id: common.yaml
            group: DEFAULT_GROUP
            refresh: true
            # 明确指定配置类型为 YAML
            file-extension: yaml
          # Data Id: pd_server
          - data-id: pd_server.yaml
            group: DEFAULT_GROUP
            refresh: true
            file-extension: yaml
      # Nacos 认证配置
